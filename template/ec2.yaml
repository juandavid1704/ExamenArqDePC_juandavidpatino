Outputs:
InstanceId:
Description: ID de la instancia EC2 creada
Value: !Ref MyInstanceClase

PublicIP:
Description: IP publica de la instancia EC2
Value: !GetAtt MyInstanceClase.PublicIp

WebsiteURL:
Description: URL del servidor web Apache
Value: !Sub "http://${MyInstanceClase.PublicDnsName}"
