AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 creada con CloudFormation y GitHub Actions para parcial en pareja

Parameters:
InstanceDescription:
Description: Descripcion del servidor web
Type: String
Default: Servidor Web Apache desplegado desde GitHub Actions

SecurityGroupDescription:
Description: Security Group Description
Type: String
Default: Acceso HTTP al servidor web

Resources:
ServerSecurityGroupClase:
Type: AWS::EC2::SecurityGroup
Properties:
GroupDescription: !Ref SecurityGroupDescription
Tags:
- Key: Name
Value: SG-HTTP-Parcial-CF
- Key: Proyecto
Value: Parcial-CloudFormation-GitHub
SecurityGroupIngress:
- IpProtocol: tcp
FromPort: 80
ToPort: 80
CidrIp: 0.0.0.0/0

MyInstanceClase:
Type: AWS::EC2::Instance
Properties:
ImageId: ami-0236922087fa98b6e
InstanceType: t3.micro
SecurityGroupIds:
- !GetAtt ServerSecurityGroupClase.GroupId
Tags:
- Key: Name
Value: EC2-Parcial-Pareja
- Key: Proyecto
Value: Parcial-CloudFormation-GitHub
- Key: Ambiente
Value: Desarrollo
UserData:
Fn::Base64: !Sub |
#!/bin/bash
yum update -y
yum install -y httpd
systemctl start httpd
systemctl enable httpd

```
      cat <<HTML > /var/www/html/index.html
